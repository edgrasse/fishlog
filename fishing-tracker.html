<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎣</text></svg>">
<title>🎣 Fish Log</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: #0d1a0d; color: #c8e6a0; font-family: 'Georgia', serif; max-width: 480px; margin: 0 auto; min-height: 100vh; }

/* Header */
.header { background: linear-gradient(135deg, #0a1a0a, #1a2d0a); border-bottom: 1px solid #2a4a1a; padding: 14px 18px 0; position: sticky; top: 0; z-index: 10; }
.header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.logo { font-size: 22px; color: #c8e6a0; font-weight: bold; letter-spacing: 1px; }
.logo-sub { color: #3a5a20; font-size: 10px; letter-spacing: 2px; font-family: sans-serif; }
.save-msg { font-size: 11px; margin-left: 8px; }
.save-msg.ok { color: #6aaa30; } .save-msg.warn { color: #e07070; } .save-msg.loading { color: #f0c040; }
.header-btns { display: flex; gap: 8px; align-items: center; }
.btn-new { background: linear-gradient(135deg, #4a7a20, #6aaa30); border: none; border-radius: 22px; color: #fff; padding: 10px 16px; font-size: 14px; cursor: pointer; font-weight: bold; }
.btn-spot { background: linear-gradient(135deg, #8a4a00, #c87020); border: none; border-radius: 22px; color: #fff; padding: 10px 14px; font-size: 13px; cursor: pointer; font-weight: bold; }
.tabs { display: flex; }
.tab { flex: 1; background: none; border: none; border-bottom: 2px solid transparent; color: #4a6a2a; padding: 10px 0; font-size: 13px; cursor: pointer; }
.tab.active { border-bottom-color: #6aaa30; color: #c8e6a0; }
.user-badge { display: flex; align-items: center; gap: 6px; padding: 0 0 12px 0; }
.user-dot { width: 10px; height: 10px; border-radius: 50%; }
.user-name { color: #8aaa60; font-size: 12px; }
.switch-user { background: none; border: 1px solid #3a5a1a; border-radius: 10px; color: #6a8a50; font-size: 11px; padding: 3px 8px; cursor: pointer; margin-left: auto; }

/* Body */
.body { padding: 20px 16px 100px; }

/* Buttons */
.btn { border-radius: 10px; padding: 13px 18px; font-size: 15px; cursor: pointer; border: none; font-weight: bold; }
.btn-primary { background: linear-gradient(135deg, #4a7a20, #6aaa30); color: #fff; }
.btn-secondary { background: transparent; color: #6a8a50; border: 1px solid #4a6a2a; }
.btn-ghost { background: #1a2a1a; color: #c8e6a0; border: 1px solid #3a5a1a; }
.btn-danger { background: #3a1a0a; color: #e07050; border: 1px solid #6a2a1a; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-full { width: 100%; }

/* Cards */
.trip-card { background: linear-gradient(135deg, #1a2a1a 0%, #2d3d20 100%); border: 1px solid #4a6a2a; border-radius: 14px; padding: 16px; margin-bottom: 12px; cursor: pointer; position: relative; box-shadow: 0 4px 14px rgba(0,0,0,0.35); }
.trip-card.draft { border-color: #8a6a20; border-style: dashed; }
.trip-card-top { display: flex; justify-content: space-between; align-items: flex-start; }
.trip-name { color: #c8e6a0; font-size: 17px; font-weight: bold; padding-right: 50px; }
.trip-meta { color: #6a8a50; font-size: 12px; margin-top: 3px; }
.trip-count-num { color: #f0c040; font-size: 26px; line-height: 1; font-weight: bold; }
.trip-count-label { color: #6a8a50; font-size: 11px; text-align: right; }
.trip-tags { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 5px; }
.tag { background: #3a5a1a; color: #c8e6a0; border-radius: 20px; padding: 3px 10px; font-size: 12px; }
.tag.draft-tag { background: #5a4a10; color: #f0c040; }
.tag.other-user { font-size: 11px; }
.trip-angler { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
.angler-dot { width: 8px; height: 8px; border-radius: 50%; }
.angler-name { color: #6a8a50; font-size: 12px; }
.trip-del { position: absolute; top: 14px; right: 14px; background: rgba(80,20,10,0.5); border: none; color: #c07060; font-size: 16px; cursor: pointer; width: 28px; height: 28px; border-radius: 14px; }

/* GPS Quick Spot */
.spot-card { background: linear-gradient(135deg, #2a1a0a, #3d2d10); border: 1px solid #8a6a20; border-radius: 14px; padding: 16px; margin-bottom: 12px; }
.spot-card-title { color: #f0c040; font-size: 14px; font-weight: bold; margin-bottom: 4px; }
.spot-coords { color: #c8b070; font-size: 12px; font-family: monospace; }

/* Form */
.form-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
.btn-cancel { background: none; border: none; color: #6a8a50; font-size: 16px; cursor: pointer; }
.step-dots { display: flex; gap: 5px; }
.step-dot { height: 8px; border-radius: 4px; background: #2a3a1a; transition: all 0.25s; }
.step-dot.active { width: 22px; background: #6aaa30; }
.step-dot.done { width: 8px; background: #4a7a20; }
.step-dot.pending { width: 8px; }
.step-title { color: #f0c040; font-size: 18px; margin-bottom: 6px; font-weight: bold; }
.step-sub { color: #6a8a50; font-size: 13px; margin-bottom: 16px; }
.field { margin-bottom: 18px; }
.field-label { color: #6a8a50; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.field input, .field textarea, .field select { width: 100%; background: #111e11; border: 1px solid #3a5a1a; border-radius: 8px; padding: 13px 14px; color: #c8e6a0; font-size: 16px; outline: none; font-family: inherit; }
.field textarea { min-height: 90px; resize: vertical; }
.field-row { display: flex; gap: 10px; }
.field-row .field { flex: 1; }
.chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
.chips-label { color: #6a8a50; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
.chip { background: #111e11; border: 1px solid #3a5a1a; color: #6a8a50; border-radius: 20px; padding: 9px 15px; font-size: 14px; cursor: pointer; }
.chip.active { background: linear-gradient(135deg, #4a7a20, #6aaa30); border-color: #6aaa30; color: #fff; }
.gps-row { display: flex; gap: 8px; align-items: flex-end; margin-bottom: 18px; }
.gps-row .field { flex: 1; margin-bottom: 0; }
.btn-gps { background: linear-gradient(135deg, #4a7a20, #6aaa30); border: none; border-radius: 8px; color: #fff; padding: 13px 14px; font-size: 13px; cursor: pointer; white-space: nowrap; font-weight: bold; }
.gps-status { color: #6a8a50; font-size: 11px; margin-top: 4px; }
.catch-log { background: #111e11; border: 1px solid #3a5a1a; border-radius: 12px; overflow: hidden; margin-top: 4px; }
.catch-log-header { display: flex; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid #3a5a1a; }
.catch-log-title { color: #6a8a50; font-size: 12px; text-transform: uppercase; }
.catch-log-total { color: #f0c040; font-size: 16px; font-weight: bold; }
.catch-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; border-bottom: 1px solid #3a5a1a; }
.catch-row:last-child { border-bottom: none; }
.catch-name { color: #c8e6a0; font-size: 14px; }
.catch-right { display: flex; align-items: center; gap: 12px; }
.catch-num { color: #f0c040; font-size: 18px; font-weight: bold; }
.catch-del { background: none; border: none; color: #7a4a3a; cursor: pointer; font-size: 18px; }
.catch-empty { text-align: center; color: #3a5a1a; padding: 20px 0; font-size: 13px; }
.form-btns { display: flex; gap: 10px; margin-top: 24px; }
.companion-row { display: flex; gap: 8px; margin-bottom: 12px; }
.companion-input { flex: 1; background: #111e11; border: 1px solid #3a5a1a; border-radius: 8px; padding: 13px 14px; color: #c8e6a0; font-size: 16px; outline: none; }
.companion-item { display: flex; justify-content: space-between; align-items: center; background: #1a2a1a; border: 1px solid #3a5a1a; border-radius: 8px; padding: 12px 16px; margin-bottom: 8px; }
.sep-box { margin-top: 20px; background: #1a2a1a; border: 1px solid #3a5a1a; border-radius: 10px; padding: 16px; }

/* Detail */
.detail-back { background: none; border: none; color: #6a8a50; font-size: 16px; cursor: pointer; padding: 0 0 18px 0; display: block; }
.detail-title { color: #c8e6a0; font-size: 24px; margin-bottom: 4px; font-weight: bold; }
.detail-date { color: #6a8a50; margin-bottom: 18px; }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 18px; }
.detail-chip { background: #1a2a1a; border: 1px solid #3a5a1a; border-radius: 9px; padding: 10px 12px; }
.detail-chip-label { color: #6a8a50; font-size: 11px; text-transform: uppercase; }
.detail-chip-val { color: #c8e6a0; font-size: 13px; margin-top: 2px; }
.section { margin-bottom: 20px; }
.section-title { color: #6a8a50; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
.catch-detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #3a5a1a; }
.saved-badge { margin-top: 20px; background: #0a1a0a; border: 1px solid #3a5a1a; border-radius: 10px; padding: 12px; color: #6aaa30; font-size: 13px; }
.draft-banner { background: #2a1a0a; border: 1px solid #8a6a20; border-radius: 10px; padding: 12px 14px; margin-bottom: 18px; }
.draft-banner-title { color: #f0c040; font-size: 14px; font-weight: bold; margin-bottom: 4px; }
.draft-banner-sub { color: #8a6a40; font-size: 13px; }
.btn-complete { background: linear-gradient(135deg, #4a7a20, #6aaa30); border: none; border-radius: 10px; color: #fff; padding: 12px 20px; font-size: 15px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 12px; }

/* Stats */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 22px; }
.stat-card { background: linear-gradient(135deg, #1a2a1a, #2d3d20); border: 1px solid #4a6a2a; border-radius: 12px; padding: 14px; }
.stat-val { color: #f0c040; font-size: 22px; font-weight: bold; }
.stat-label { color: #6a8a50; font-size: 12px; }
.leaderboard-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; background: #1a2a1a; border-radius: 9px; margin-bottom: 8px; border: 1px solid #3a5a1a; }
.lb-left { display: flex; align-items: center; gap: 10px; }
.lb-dot { width: 12px; height: 12px; border-radius: 50%; }
.lb-name { color: #c8e6a0; font-size: 15px; font-weight: bold; }
.lb-fish { color: #f0c040; font-size: 20px; font-weight: bold; }
.lb-label { color: #6a8a50; font-size: 11px; }
.bar-row { margin-bottom: 10px; }
.bar-label-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
.bar-name { color: #c8e6a0; font-size: 14px; }
.bar-num { color: #f0c040; font-weight: bold; }
.bar-bg { background: #1a2a0a; border-radius: 4px; height: 7px; }
.bar-fill { background: linear-gradient(90deg, #4a7a20, #6aaa30); border-radius: 4px; height: 7px; }
.spot-list-row { display: flex; justify-content: space-between; padding: 10px 14px; background: #1a2a1a; border-radius: 9px; margin-bottom: 8px; border: 1px solid #3a5a1a; }

/* Login / Register */
.auth-screen { padding: 40px 24px; text-align: center; }
.auth-icon { font-size: 60px; margin-bottom: 20px; }
.auth-title { color: #c8e6a0; font-size: 26px; font-weight: bold; margin-bottom: 8px; }
.auth-sub { color: #6a8a50; font-size: 14px; margin-bottom: 32px; line-height: 1.6; }
.user-list { margin-bottom: 24px; }
.user-option { display: flex; align-items: center; gap: 12px; background: #1a2a1a; border: 1px solid #3a5a1a; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; cursor: pointer; text-align: left; width: 100%; }
.user-option:hover { border-color: #6aaa30; }
.user-option-dot { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; }
.user-option-name { color: #c8e6a0; font-size: 16px; font-weight: bold; }
.user-option-sub { color: #6a8a50; font-size: 12px; }
.pin-dots { display: flex; gap: 12px; justify-content: center; margin: 20px 0; }
.pin-dot { width: 18px; height: 18px; border-radius: 50%; border: 2px solid #4a6a2a; background: transparent; transition: all 0.2s; }
.pin-dot.filled { background: #6aaa30; border-color: #6aaa30; }
.numpad { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; max-width: 260px; margin: 0 auto; }
.numpad-btn { background: #1a2a1a; border: 1px solid #3a5a1a; border-radius: 10px; color: #c8e6a0; font-size: 22px; padding: 16px; cursor: pointer; font-weight: bold; }
.numpad-btn:active { background: #2a3a2a; }
.numpad-btn.del { color: #8a5a50; font-size: 18px; }
.color-options { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
.color-opt { width: 36px; height: 36px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; }
.color-opt.selected { border-color: #fff; }
.icon-options { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
.icon-opt { font-size: 28px; cursor: pointer; padding: 6px; border-radius: 8px; border: 2px solid transparent; }
.icon-opt.selected { border-color: #6aaa30; background: #1a2a1a; }

/* View toggle */
.view-toggle { display: flex; background: #1a2a1a; border: 1px solid #3a5a1a; border-radius: 22px; padding: 3px; margin-bottom: 16px; }
.view-toggle-btn { flex: 1; background: none; border: none; color: #6a8a50; font-size: 13px; padding: 7px; border-radius: 20px; cursor: pointer; }
.view-toggle-btn.active { background: linear-gradient(135deg, #4a7a20, #6aaa30); color: #fff; }

/* Empty */
.empty { text-align: center; padding: 60px 20px; }
.empty-icon { font-size: 56px; margin-bottom: 18px; }
.empty-title { color: #6aaa30; font-size: 22px; margin-bottom: 8px; }
.empty-sub { color: #6a8a50; font-size: 14px; margin-bottom: 28px; line-height: 1.6; }

/* Loading */
.loading { text-align: center; padding: 60px 20px; color: #4a6a2a; font-size: 16px; }
</style>
</head>
<body>

<div id="app"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────
const WORKER_URL = 'https://grasse-apps-proxy.ed-53c.workers.dev';
const APP_ID = 'fishinglog';

const SPECIES = ["Yellow Perch","Walleye","Crappie","Largemouth Bass","Northern Pike","Muskie","Bluegill/Panfish","Catfish","Other"];
const LOC_TYPES = ["My Boathouse/Channel","Bridge","Boat - Mine","Boat - Other's","Shore","Pier/Dock","Ice","Other"];
const BAITS = ["Rosie Red Minnows","Live Minnows","Nightcrawlers","Leeches","Spinnerbait","Jerkbait","Swimbait","Jig","Crankbait","Other"];
const WIND = ["Calm","Light Breeze","Moderate Wind","Strong Wind"];
const SKY = ["Sunny","Partly Cloudy","Overcast","Foggy","Rainy"];
const COLORS = ["#6aaa30","#e05050","#5080e0","#e09020","#9050e0","#20a0c0","#e05090","#50a070"];
const ICONS = ["🎣","🐟","🦈","⚓","🚤","🏕️","🌊","🏆"];

// ── STATE ──────────────────────────────────────────────────────
let currentUser = null;
let currentView = 'log'; // log | new | detail | stats | auth | register | pin
let trips = [];
let catches = {};
let users = [];
let selectedTrip = null;
let showAllUsers = false;
let pendingAction = null;
let formData = {};
let formStep = 0;
let pinBuffer = '';
let pinTarget = null;
let registerData = {};

// Load saved user session
try {
  const saved = localStorage.getItem('fishlog-user');
  if (saved) currentUser = JSON.parse(saved);
} catch {}

// ── SUPABASE VIA WORKER ────────────────────────────────────────
async function workerCall(payload) {
  const r = await fetch(WORKER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ appId: APP_ID, ...payload })
  });
  if (!r.ok) throw new Error('Worker error: ' + r.status);
  const json = await r.json();
  // Normalize response — worker may return array directly or {data:[]} wrapper
  if (Array.isArray(json)) return { data: json };
  if (json.data !== undefined) return json;
  if (json.error) throw new Error('Supabase error: ' + json.error);
  return { data: [] };
}
async function sbGet(table, filters) { return workerCall({ method: 'SELECT', table, filters: filters || '' }); }
async function sbInsert(table, row) { return workerCall({ method: 'INSERT', table, data: row }); }
async function sbDelete(table, id, idField) { return workerCall({ method: 'DELETE', table, idField: idField || 'id', idValue: id }); }
async function sbUpdate(table, id, row) { return workerCall({ method: 'UPDATE', table, data: row, idField: 'id', idValue: id }); }

function genId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 6); }
function hashPin(pin) { let h = 0; for (let c of pin) { h = ((h << 5) - h) + c.charCodeAt(0); h |= 0; } return h.toString(16); }
function fmtDate(d) { try { return new Date(d + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); } catch { return d; } }
function showMsg(msg, type, dur = 4000) {
  const el = document.getElementById('saveMsg');
  if (!el) return;
  el.textContent = msg; el.className = 'save-msg ' + type;
  if (dur) setTimeout(() => { el.textContent = ''; el.className = 'save-msg'; }, dur);
}

// ── DATA LOADING ───────────────────────────────────────────────
async function loadData() {
  try {
    // Load users first separately so auth screen always works
    const userRes = await sbGet('FishingUsers', 'order=name.asc');
    users = userRes.data || [];
    console.log('Users loaded:', users.length, users.map(u => u.name));

    const [tripRes] = await Promise.all([
      sbGet('FishingTrips', 'order=created_at.desc'),
    ]);
    trips = tripRes.data || [];

    // Load catches for visible trips
    if (trips.length > 0) {
      const catchRes = await sbGet('FishingCatches', 'order=created_at.asc');
      const allCatches = catchRes.data || [];
      catches = {};
      allCatches.forEach(c => {
        if (!catches[c.trip_id]) catches[c.trip_id] = [];
        catches[c.trip_id].push(c);
      });
    }
  } catch(e) { console.error('Load error', e); }
}

function getVisibleTrips() {
  if (showAllUsers) return trips;
  if (!currentUser) return trips;
  return trips.filter(t => t.user_id === currentUser.id);
}

function tripTotal(tripId) {
  return (catches[tripId] || []).reduce((s, c) => s + (parseInt(c.count) || 0), 0);
}

function userById(id) { return users.find(u => u.id === id); }
function userColor(id) { const u = userById(id); return u ? u.color : '#6aaa30'; }
function userName(id) { const u = userById(id); return u ? u.name : 'Unknown'; }

// ── RENDER ─────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  const isAuth = !currentUser || currentView === 'auth' || currentView === 'register' || currentView === 'pin';

  if (isAuth) { app.innerHTML = renderAuth(); attachAuthEvents(); return; }

  const showHeader = ['log','stats'].includes(currentView);
  const showNew = currentView === 'log';

  app.innerHTML = `
    <div class="header">
      <div class="header-top">
        <div>
          <div class="logo">🎣 FISH LOG</div>
          <div class="logo-sub">WISCONSIN · SUPABASE · v1.1 · 2026-04-28 <span id="saveMsg" class="save-msg"></span></div>
        </div>
        <div class="header-btns">
          ${showNew ? `<button class="btn-spot" onclick="quickSpot()">📍 Save Spot</button>` : ''}
          ${showNew ? `<button class="btn-new" onclick="startNewTrip()">+ Trip</button>` : ''}
        </div>
      </div>
      <div class="user-badge">
        <div class="user-dot" style="background:${currentUser.color}"></div>
        <span class="user-name">${currentUser.icon} ${currentUser.name}</span>
        <button class="switch-user" onclick="switchUser()">Switch User</button>
      </div>
      ${showHeader ? `<div class="tabs">
        <button class="tab ${currentView==='log'?'active':''}" onclick="setView('log')">🎣 Trips</button>
        <button class="tab ${currentView==='stats'?'active':''}" onclick="setView('stats')">📊 Stats</button>
      </div>` : ''}
    </div>
    <div class="body" id="appBody"></div>`;

  const body = document.getElementById('appBody');
  if (currentView === 'log') body.innerHTML = renderLog();
  else if (currentView === 'new') body.innerHTML = renderForm();
  else if (currentView === 'detail' && selectedTrip) body.innerHTML = renderDetail();
  else if (currentView === 'stats') body.innerHTML = renderStats();

  if (currentView === 'new') attachFormEvents();
}

// ── AUTH SCREENS ───────────────────────────────────────────────
function renderAuth() {
  if (currentView === 'register') return renderRegister();
  if (currentView === 'pin') return renderPin();
  // User selection
  return `<div class="auth-screen">
    <div class="auth-icon">🎣</div>
    <div class="auth-title">Fish Log</div>
    <div class="auth-sub">Who's fishing today?</div>
    ${users.length === 0 ? `
    <div style="background:#1a1a0a;border:1px solid #8a6a20;border-radius:10px;padding:14px;margin-bottom:16px;text-align:left">
      <div style="color:#f0c040;font-size:13px;font-weight:bold;margin-bottom:8px">⚠️ Could not load users</div>
      <div style="color:#8a7a50;font-size:12px;margin-bottom:8px">Diagnostic info:</div>

function attachAuthEvents() {}

async function selectUser(id) {
  pinTarget = users.find(u => u.id === id);
  pinBuffer = '';
  setView('pin');
}

function pinPress(n) {
  if (n === '⌫') { pinBuffer = pinBuffer.slice(0, -1); render(); return; }
  if (n === '' || pinBuffer.length >= 4) return;
  pinBuffer += n;
  render();
  if (pinBuffer.length === 4) {
    setTimeout(() => verifyPin(), 100);
  }
}

async function verifyPin() {
  const h = hashPin(pinBuffer);
  if (h === pinTarget.pin_hash) {
    currentUser = pinTarget;
    try { localStorage.setItem('fishlog-user', JSON.stringify(currentUser)); } catch {}
    pinBuffer = '';
    showMsg('Welcome, ' + currentUser.name + '!', 'ok');
    setView('log');
  } else {
    pinBuffer = '';
    const msg = document.getElementById('pinMsg');
    if (msg) { msg.textContent = '❌ Wrong PIN — try again'; }
    render();
  }
}

function switchUser() {
  currentUser = null;
  try { localStorage.removeItem('fishlog-user'); } catch {}
  setView('auth');
}

function viewOnly() {
  currentUser = { id: 'readonly', name: 'Viewer', color: '#6a8a50', icon: '👁', pin_hash: '', readonly: true };
  setView('log');
}

function startRegister() {
  registerData = { color: COLORS[0], icon: ICONS[0] };
  setView('register');
}

async function createUser() {
  const name = document.getElementById('regName')?.value?.trim();
  const pinVal = document.getElementById('regPin')?.value?.trim();
  if (!name) { alert('Please enter a name'); return; }
  if (!pinVal || pinVal.length !== 4 || isNaN(pinVal)) { alert('Please enter a 4-digit PIN'); return; }
  if (!registerData.color) { alert('Please pick a color'); return; }
  if (!registerData.icon) { alert('Please pick an icon'); return; }

  const newUser = {
    id: genId(),
    name,
    pin_hash: hashPin(pinVal),
    color: registerData.color,
    icon: registerData.icon,
    created_at: new Date().toISOString()
  };

  try {
    await sbInsert('FishingUsers', newUser);
    users.push(newUser);
    currentUser = newUser;
    try { localStorage.setItem('fishlog-user', JSON.stringify(currentUser)); } catch {}
    showMsg('Welcome, ' + name + '!', 'ok');
    setView('log');
  } catch(e) { alert('Error creating profile: ' + e.message); }
}

// ── LOG VIEW ───────────────────────────────────────────────────
function renderLog() {
  const visible = getVisibleTrips();
  const drafts = visible.filter(t => t.status === 'draft');
  const complete = visible.filter(t => t.status !== 'draft');
  const isReadonly = currentUser?.readonly;

  return `
    ${!isReadonly ? `<div class="view-toggle">
      <button class="view-toggle-btn ${!showAllUsers?'active':''}" onclick="showAllUsers=false;render()">My Trips</button>
      <button class="view-toggle-btn ${showAllUsers?'active':''}" onclick="showAllUsers=true;render()">All Anglers</button>
    </div>` : ''}
    ${drafts.length ? `<div style="color:#f0c040;font-size:12px;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">📍 Saved Spots — Complete Later</div>
    ${drafts.map(t => renderCard(t)).join('')}
    <div style="color:#4a6a2a;font-size:12px;margin:8px 0 16px;text-transform:uppercase;letter-spacing:1px">Completed Trips</div>` : ''}
    ${complete.length ? complete.map(t => renderCard(t)).join('') :
      `<div class="empty">
        <div class="empty-icon">🎣</div>
        <div class="empty-title">${showAllUsers ? 'No trips yet' : 'No trips logged'}</div>
        <div class="empty-sub">${isReadonly ? 'Switch to an angler to log trips' : 'Tap + Trip to log a trip or 📍 Save Spot to grab your GPS location now'}</div>
      </div>`}`;
}

function renderCard(t) {
  const total = tripTotal(t.id);
  const tc = catches[t.id] || [];
  const species = [...new Set(tc.map(c => c.species))];
  const isOwn = t.user_id === currentUser?.id;
  const canDel = isOwn && !currentUser?.readonly;
  const uColor = userColor(t.user_id);
  const uName = userName(t.user_id);

  return `<div class="trip-card ${t.status==='draft'?'draft':''}" onclick="openTrip('${t.id}')">
    <div class="trip-card-top">
      <div>
        <div class="trip-name">${t.location_name || t.location_type || (t.status==='draft'?'📍 Saved Spot':'Unnamed Spot')}</div>
        <div class="trip-meta">${fmtDate(t.date)}${t.location_type?' · '+t.location_type:''}</div>
      </div>
      <div>
        <div class="trip-count-num">${t.status==='draft'?'—':total}</div>
        <div class="trip-count-label">${t.status==='draft'?'draft':'fish'}</div>
      </div>
    </div>
    <div class="trip-tags">
      ${t.status==='draft'?'<span class="tag draft-tag">📍 Tap to complete</span>':''}
      ${species.map(s=>`<span class="tag">${s}</span>`).join('')}
      ${showAllUsers?`<span class="tag other-user" style="background:#1a2a2a">${uName}</span>`:''}
    </div>
    ${showAllUsers?`<div class="trip-angler"><div class="angler-dot" style="background:${uColor}"></div><span class="angler-name">${uName}</span></div>`:''}
    ${canDel?`<button class="trip-del" onclick="event.stopPropagation();deleteTrip('${t.id}')">✕</button>`:''}
  </div>`;
}

async function openTrip(id) {
  selectedTrip = trips.find(t => t.id === id);
  if (!selectedTrip) return;
  // If it's a draft and it's ours, offer to complete
  setView('detail');
}

async function deleteTrip(id) {
  if (!confirm('Delete this trip and all its catches?\nThis cannot be undone.')) return;
  showMsg('Deleting...', 'loading', 0);
  try {
    // Delete catches first
    const tc = catches[id] || [];
    for (const c of tc) await sbDelete('FishingCatches', c.id);
    await sbDelete('FishingTrips', id);
    trips = trips.filter(t => t.id !== id);
    delete catches[id];
    showMsg('✅ Deleted', 'ok');
    render();
  } catch(e) { showMsg('⚠️ Delete failed', 'warn'); }
}

// ── QUICK SPOT ─────────────────────────────────────────────────
async function quickSpot() {
  if (currentUser?.readonly) { alert('Switch to your angler profile to save a spot'); return; }
  if (!navigator.geolocation) { alert('GPS not available on this device'); return; }
  showMsg('📍 Getting your location...', 'loading', 0);
  navigator.geolocation.getCurrentPosition(async (pos) => {
    const lat = pos.coords.latitude.toFixed(6);
    const lng = pos.coords.longitude.toFixed(6);
    const now = new Date();
    const trip = {
      id: genId(),
      user_id: currentUser.id,
      user_name: currentUser.name,
      date: now.toISOString().split('T')[0],
      location_name: '',
      location_type: '',
      latitude: lat,
      longitude: lng,
      start_time: now.toTimeString().slice(0,5),
      end_time: '',
      bait: '',
      wind: '',
      sky: '',
      notes: '',
      status: 'draft',
      created_at: now.toISOString()
    };
    try {
      await sbInsert('FishingTrips', trip);
      trips.unshift(trip);
      catches[trip.id] = [];
      showMsg('📍 Spot saved! ' + lat + ', ' + lng, 'ok', 5000);
      render();
    } catch(e) { showMsg('⚠️ Could not save spot', 'warn'); }
  }, (err) => {
    showMsg('⚠️ Could not get location', 'warn');
  }, { enableHighAccuracy: true, timeout: 10000 });
}

function startNewTrip() {
  if (currentUser?.readonly) { alert('Switch to your angler profile to log a trip'); return; }
  formData = {
    date: new Date().toISOString().split('T')[0],
    locationName: '', locationType: '', latitude: '', longitude: '',
    startTime: '', endTime: '', companions: [], separateCounts: false,
    catches: [], groupCatches: [], bait: [], wind: '', sky: '', notes: '',
    isCompleting: false
  };
  formStep = 0;
  setView('new');
}

function renderForm() {
  const steps = [renderStep0, renderStep1, renderStep2, renderStep3];
  const dots = [0,1,2,3].map(i=>`<div class="step-dot ${i===formStep?'active':i<formStep?'done':'pending'}"></div>`).join('');

    <div class="step-dots">${dots}</div>

    ${formStep<3
      ?`<button class="btn btn-primary" style="flex:2" onclick="formStepChange(1)">Next →</button>`
      :`<button class="btn btn-primary btn-full" id="btnSave" onclick="saveTrip()">✅ Save Trip</button>`}

}

function renderStep1() {
  return `<div class="step-title">👥 Who Were You With?</div>

function renderStep2() {

function attachFormEvents() {}

function captureFields() {
  const spotEl = document.getElementById('fSpot');
  const latEl = document.getElementById('fLat');
  const lngEl = document.getElementById('fLng');
  const countEl = document.getElementById('fCount');
  const notesEl = document.getElementById('fNotes');
  const dateEl = document.getElementById('fDate');
  if (spotEl) formData.locationName = spotEl.value;
  if (latEl) formData.latitude = latEl.value;
  if (lngEl) formData.longitude = lngEl.value;
  if (countEl) formData.cCount = countEl.value;
  if (notesEl) formData.notes = notesEl.value;
  if (dateEl) formData.date = dateEl.value;
}

function captureAndSet(key, val) {
  captureFields();
  formData[key] = formData[key] === val ? '' : val;
  if (key === 'cSpecies' || key === 'cPerson') {} // don't reset count
  rerender();
}

function toggleBait(b) {
  captureFields();
  formData.bait = formData.bait.includes(b) ? formData.bait.filter(x=>x!==b) : [...formData.bait, b];
  rerender();
}

function rerender() {
  const body = document.getElementById('appBody');
  if (body) { body.innerHTML = renderForm(); }
}

function formStepChange(dir) {
  captureFields();
  formStep += dir;
  rerender();
}

function addComp() {
  const el = document.getElementById('compInput');
  const val = el ? el.value.trim() : '';
  if (val) { formData.companions.push(val); if(el) el.value=''; rerender(); }
}
function removeComp(i) { formData.companions.splice(i,1); rerender(); }

function addCatch() {
  captureFields();
  if (!formData.cSpecies || !formData.cCount || parseInt(formData.cCount)<=0) return;
  const entry = { species: formData.cSpecies, count: parseInt(formData.cCount) };
  if (formData.separateCounts && formData.cPerson && formData.cPerson !== 'Group') {
    entry.person = formData.cPerson;
    formData.catches.push(entry);
  } else {
    formData.groupCatches.push(entry);
  }
  formData.cSpecies = ''; formData.cCount = '';
  rerender();
}

function removeCatch(i) {
  const all = [...formData.catches.map((c,j)=>({...c,_src:'catches',_idx:j})), ...formData.groupCatches.map((c,j)=>({...c,_src:'groupCatches',_idx:j}))];
  const item = all[i];
  if (item._src==='catches') formData.catches.splice(item._idx,1);
  else formData.groupCatches.splice(item._idx,1);
  rerender();
}

function captureGPS() {
  if (!navigator.geolocation) { alert('GPS not available'); return; }
  const statusEl = document.getElementById('gpsStatus');
  if (statusEl) statusEl.textContent = '⏳ Getting location...';
  navigator.geolocation.getCurrentPosition(pos => {
    formData.latitude = pos.coords.latitude.toFixed(6);
    formData.longitude = pos.coords.longitude.toFixed(6);
    const latEl = document.getElementById('fLat');
    const lngEl = document.getElementById('fLng');
    if (latEl) latEl.value = formData.latitude;
    if (lngEl) lngEl.value = formData.longitude;
    if (statusEl) statusEl.textContent = '✅ GPS captured: ' + parseFloat(formData.latitude).toFixed(4) + ', ' + parseFloat(formData.longitude).toFixed(4);
  }, () => {
    if (statusEl) statusEl.textContent = '⚠️ Could not get location';
  }, { enableHighAccuracy: true, timeout: 10000 });
}

async function saveTrip() {
  captureFields();
  const btn = document.getElementById('btnSave');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Saving...'; }
  showMsg('Saving...', 'loading', 0);

  const allCatches = [...formData.catches, ...formData.groupCatches];
  const now = new Date().toISOString();
  const isCompleting = formData.isCompleting;
  const tripId = formData.id || genId();

  const trip = {
    id: tripId,
    user_id: currentUser.id,
    user_name: currentUser.name,
    date: formData.date,
    location_name: formData.locationName,
    location_type: formData.locationType,
    latitude: formData.latitude,
    longitude: formData.longitude,
    start_time: formData.startTime,
    end_time: formData.endTime,
    bait: formData.bait.join(', '),
    wind: formData.wind,
    sky: formData.sky,
    notes: formData.notes,
    status: 'complete',
    created_at: now
  };

  try {
    if (isCompleting) {
      await sbUpdate('FishingTrips', tripId, trip);
      const idx = trips.findIndex(t => t.id === tripId);
      if (idx >= 0) trips[idx] = { ...trips[idx], ...trip };
    } else {
      await sbInsert('FishingTrips', trip);
      trips.unshift(trip);
    }

    // Save catches
    catches[tripId] = catches[tripId] || [];
    for (const c of allCatches) {
      const catchRow = {
        id: genId(),
        trip_id: tripId,
        user_id: currentUser.id,
        species: c.species,
        count: c.count,
        person: c.person || '',
        created_at: now
      };
      await sbInsert('FishingCatches', catchRow);
      catches[tripId].push(catchRow);
    }

    showMsg('✅ Trip saved!', 'ok');
    setView('log');
  } catch(e) {
    showMsg('⚠️ Save failed: ' + e.message, 'warn');
    if (btn) { btn.disabled = false; btn.textContent = '✅ Save Trip'; }
  }
}

// ── STATS VIEW ─────────────────────────────────────────────────
function renderStats() {
  const visible = showAllUsers ? trips : trips.filter(t => t.user_id === currentUser?.id);
  const complete = visible.filter(t => t.status !== 'draft');

  if (!complete.length) return `<div class="empty"><div class="empty-icon">📊</div><div class="empty-title">No data yet</div><div class="empty-sub">Log some trips to see stats!</div></div>`;

  const bySpecies = {}, bySpot = {};
  let totalFish = 0;
  complete.forEach(t => {
    (catches[t.id]||[]).forEach(c => {
      const n = parseInt(c.count)||0;
      bySpecies[c.species] = (bySpecies[c.species]||0) + n;
      totalFish += n;
    });
    const loc = t.location_name || t.location_type || 'Unknown';
    bySpot[loc] = (bySpot[loc]||0) + tripTotal(t.id);
  });

  // Leaderboard
  const byUser = {};
  trips.filter(t=>t.status!=='draft').forEach(t => {
    (catches[t.id]||[]).forEach(c => {
      byUser[t.user_id] = (byUser[t.user_id]||0) + (parseInt(c.count)||0);
    });
  });
  const lb = Object.entries(byUser).sort((a,b)=>b[1]-a[1]);

  const topSpecies = Object.entries(bySpecies).sort((a,b)=>b[1]-a[1]);
  const topSpots = Object.entries(bySpot).sort((a,b)=>b[1]-a[1]);

  return `
    <div class="view-toggle">
      <button class="view-toggle-btn ${!showAllUsers?'active':''}" onclick="showAllUsers=false;render()">My Stats</button>
      <button class="view-toggle-btn ${showAllUsers?'active':''}" onclick="showAllUsers=true;render()">All Anglers</button>
    </div>
    <div class="stats-grid">
      ${[{l:'Trips',v:complete.length},{l:'Total Fish',v:totalFish},{l:'Top Species',v:topSpecies[0]?.[0]?.split('/')[0]||'—'},{l:'Top Spot',v:topSpots[0]?.[0]||'—'}].map(({l,v})=>`<div class="stat-card"><div class="stat-val">${v}</div><div class="stat-label">${l}</div></div>`).join('')}
    </div>
    ${lb.length>1?`<div class="section"><div class="section-title">🏆 Leaderboard</div>
      ${lb.map(([uid,fish],i)=>`<div class="leaderboard-row">
        <div class="lb-left"><span style="color:#f0c040;font-size:18px;width:24px">${['🥇','🥈','🥉'][i]||'  '}</span><div class="lb-dot" style="background:${userColor(uid)}"></div><span class="lb-name">${userName(uid)}</span></div>
        <div><div class="lb-fish">${fish}</div><div class="lb-label">fish</div></div>
      </div>`).join('')}
    </div>`:''}
    ${topSpecies.length?`<div class="section"><div class="section-title">By Species</div>
      ${topSpecies.map(([sp,ct])=>`<div class="bar-row">
        <div class="bar-label-row"><span class="bar-name">${sp}</span><span class="bar-num">${ct}</span></div>
        <div class="bar-bg"><div class="bar-fill" style="width:${Math.round(ct/totalFish*100)}%"></div></div>
      </div>`).join('')}
    </div>`:''}
    ${topSpots.length?`<div class="section"><div class="section-title">Top Spots</div>
      ${topSpots.slice(0,6).map(([sp,ct])=>`<div class="spot-list-row"><span style="color:#c8e6a0;font-size:13px">📍 ${sp}</span><span style="color:#f0c040;font-weight:bold">${ct} fish</span></div>`).join('')}
    </div>`:''}`;
}

// ── ROUTING ────────────────────────────────────────────────────
function setView(v) {
  currentView = v;
  render();
}

// ── DIAGNOSTIC ────────────────────────────────────────────────
async function runDiagnostic() {
  const el = document.getElementById('diagInfo');
  if (el) el.textContent = 'Testing worker connection...';
  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ appId: APP_ID, method: 'SELECT', table: 'FishingUsers', filters: 'order=name.asc' })
    });
    const text = await res.text();
    if (el) el.textContent = `Status: ${res.status} | Response: ${text.substring(0, 200)}`;
    try {
      const json = JSON.parse(text);
      const data = Array.isArray(json) ? json : (json.data || []);
      if (data.length > 0) {
        users = data;
        setView('auth');
      } else {
        if (el) el.textContent = `Worker OK but no users in response. Raw: ${text.substring(0, 200)}`;
      }
    } catch(pe) {
      if (el) el.textContent = `Parse error: ${pe.message} | Raw: ${text.substring(0, 150)}`;
    }
  } catch(e) {
    if (el) el.textContent = `Connection failed: ${e.message}`;
  }
}

// ── INIT ───────────────────────────────────────────────────────
async function init() {
  document.getElementById('app').innerHTML = '<div class="loading">⏳ Loading Fish Log...</div>';
  try {
    await loadData();
  } catch(e) {
    console.error('Init error:', e);
    document.getElementById('app').innerHTML = `<div class="loading" style="color:#e07070">⚠️ Connection error<br><small style="font-size:12px;color:#6a4a4a">${e.message}</small><br><br><button onclick="init()" style="background:#4a7a20;border:none;color:#fff;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:14px">Retry</button></div>`;
    return;
  }
  if (!currentUser) {
    setView('auth');
    // Auto-run diagnostic if no users loaded
    if (users.length === 0) {
      setTimeout(runDiagnostic, 500);
    }
  } else {
    setView('log');
  }
}

init();
</script>
