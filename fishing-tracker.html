// ── HELPERS ───────────────────────────────────────────────────
function genId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 6); }
function hashPin(pin) { let h = 0; for (let c of pin) { h = ((h << 5) - h) + c.charCodeAt(0); h |= 0; } return h.toString(16); }
function fmtDate(d) { try { return new Date(d + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); } catch { return d; } }
function showMsg(msg, type, dur = 4000) {
  const el = document.getElementById('saveMsg');
  if (!el) return;
  el.textContent = msg; el.className = 'save-msg ' + type;
  if (dur) setTimeout(() => { el.textContent = ''; el.className = 'save-msg'; }, dur);
}
function fullName(user) {
  if (!user) return 'Unknown';
  return user.last_name ? user.name + ' ' + user.last_name : user.name;
}

// ── DATA ──────────────────────────────────────────────────────
async function loadData() {
  try {
    const [userRes, tripRes, speciesRes] = await Promise.all([
      sbGet('FishingUsers', 'order=name.asc'),
      sbGet('FishingTrips', 'order=created_at.desc'),
      sbGet('FishingSpecies', 'order=name.asc')
    ]);
    users = userRes.data || [];
    outings = tripRes.data || [];
    const sp = speciesRes.data || [];
    if (sp.length > 0) species = sp.map(s => s.name);

    if (outings.length > 0) {
      const [catchRes, photoRes, sharedRes] = await Promise.all([
        sbGet('FishingCatches', 'order=created_at.asc'),
        sbGet('FishingPhotos', 'order=created_at.asc'),
        sbGet('FishingSharedOutings', 'order=created_at.asc')
      ]);
      catches = {};
      (catchRes.data || []).forEach(c => { if (!catches[c.trip_id]) catches[c.trip_id] = []; catches[c.trip_id].push(c); });
      photos = {};
      (photoRes.data || []).forEach(p => { if (!photos[p.trip_id]) photos[p.trip_id] = []; photos[p.trip_id].push(p); });

      // Add shared outings to visible set
      const sharedData = sharedRes.data || [];
      // Mark outings shared TO current user
      const sharedTripIds = new Set(sharedData.filter(s => s.user_id === currentUser?.id).map(s => s.trip_id));
      outings.forEach(o => { if (sharedTripIds.has(o.id)) o._shared = true; });
      // Store which users each outing was shared WITH (for companion display)
      outings.forEach(o => {
        const sharedWith = sharedData.filter(s => s.trip_id === o.id).map(s => s.user_id);
        if (sharedWith.length) o._sharedWith = sharedWith;
      });
    }
  } catch(e) { console.error('Load error', e); }
}

function getVisibleOutings() {
  if (showAllUsers || !currentUser || currentUser.readonly) return outings;
  return outings.filter(t => t.user_id === currentUser.id || t._shared);
}
function outingTotal(id) { return (catches[id] || []).reduce((s, c) => s + (parseInt(c.count) || 0), 0); }
function userById(id) { return users.find(u => u.id === id); }
function userColor(id) { const u = userById(id); return u ? u.color : '#6aaa30'; }
function userDisplayName(id) { const u = userById(id); return u ? fullName(u) : 'Unknown'; }

  if (isAuth) { app.innerHTML = renderAuth(); return; }

  app.innerHTML = `
    <div class="header">
      <div class="header-top">
        <div>
          <div class="logo">🎣 FISH LOG</div>
          <div class="logo-sub">${VERSION} <span id="saveMsg" class="save-msg"></span></div>
        </div>
        <div class="header-btns">
          ${currentView === 'log' && !currentUser?.readonly ? `<button class="btn-spot" onclick="quickSpot()">📍 Spot</button>` : ''}
          ${currentView === 'log' && !currentUser?.readonly ? `<button class="btn-new" onclick="startNew()">+ Outing</button>` : ''}
        </div>
      </div>
      <div class="user-badge">
        <div class="user-dot" style="background:${currentUser.color}"></div>
        <span class="user-name-label">${currentUser.icon} ${fullName(currentUser)}</span>
        <button class="switch-user" onclick="setView('editprofile')" style="margin-right:6px">✏️ Profile</button>
        <button class="switch-user" onclick="switchUser()">Switch</button>
      </div>
      ${['log','stats','faq'].includes(currentView) ? `<div class="tabs">
        <button class="tab ${currentView==='log'?'active':''}" onclick="setView('log')">🎣 Outings</button>
        <button class="tab ${currentView==='stats'?'active':''}" onclick="setView('stats')">📊 Stats</button>
        <button class="tab ${currentView==='faq'?'active':''}" onclick="setView('faq')">❓ Help</button>
      </div>` : ''}
    </div>
    <div class="body" id="appBody"></div>`;

  const body = document.getElementById('appBody');
  if (currentView === 'log') body.innerHTML = renderLog();
  else if (currentView === 'new') body.innerHTML = renderForm();
  else if (currentView === 'detail' && selectedOuting) body.innerHTML = renderDetail();
  else if (currentView === 'stats') body.innerHTML = renderStats();
  else if (currentView === 'faq') body.innerHTML = renderFAQ();
  else if (currentView === 'editprofile') body.innerHTML = renderEditProfile();
  if (currentView === 'new') attachFormEvents();
}

async function selectUser(id) { pinTarget = users.find(u=>u.id===id); pinBuffer=''; setView('pin'); }
function pinPress(n) {
  if (n==='⌫') { pinBuffer=pinBuffer.slice(0,-1); render(); return; }
  if (n===''||pinBuffer.length>=4) return;
  pinBuffer+=n; render();
  if (pinBuffer.length===4) setTimeout(verifyPin,100);
}
async function verifyPin() {
  if (hashPin(pinBuffer)===pinTarget.pin_hash) {
    currentUser=pinTarget;
    try { localStorage.setItem('fishlog-user',JSON.stringify(currentUser)); } catch {}
    pinBuffer='';
    showMsg('Welcome back, '+fullName(currentUser)+'!','ok');
    setView('log');
  } else {
    pinBuffer='';
    const err=document.getElementById('pinErr');
    if (err) err.textContent='❌ Wrong secret code — try again';
    render();
  }
}
function switchUser() { currentUser=null; try{localStorage.removeItem('fishlog-user');}catch{} setView('auth'); }
function viewOnly() { currentUser={id:'readonly',name:'Viewer',last_name:'',color:'#6a8a50',icon:'👁',pin_hash:'',readonly:true}; setView('log'); }
function startRegister() { registerData={color:COLORS[0],icon:ICONS[0]}; setView('register'); }
async function createUser() {
  const first=document.getElementById('regFirst')?.value?.trim();
  const last=document.getElementById('regLast')?.value?.trim()||'';
  const pinVal=document.getElementById('regPin')?.value?.trim();
  if (!first){alert('Please enter your first name');return;}
  if (!pinVal||pinVal.length!==4||isNaN(pinVal)){alert('Please enter a 4-digit secret code');return;}
  if (!registerData.color){alert('Please pick a color');return;}
  if (!registerData.icon){alert('Please pick an icon');return;}
  const newUser={id:genId(),name:first,last_name:last,pin_hash:hashPin(pinVal),color:registerData.color,icon:registerData.icon,created_at:new Date().toISOString()};
  try {
    await sbInsert('FishingUsers',newUser);
    users.push(newUser);
    currentUser=newUser;
    try{localStorage.setItem('fishlog-user',JSON.stringify(currentUser));}catch{}
    registerData.createdName=first;
    setView('onboard');
  } catch(e){alert('Error creating profile: '+e.message);}
}

// ── LOG VIEW ──────────────────────────────────────────────────
function renderLog() {
  const visible=getVisibleOutings();
  const drafts=visible.filter(t=>t.status==='draft');
  const complete=visible.filter(t=>t.status!=='draft');
  return `
    <div class="view-toggle">
      <button class="view-toggle-btn ${!showAllUsers?'active':''}" onclick="showAllUsers=false;render()">My Outings</button>
      <button class="view-toggle-btn ${showAllUsers?'active':''}" onclick="showAllUsers=true;render()">All Anglers</button>
    </div>
    ${drafts.length?`<div style="color:#f0c040;font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">📍 Saved Spots — Tap to Complete</div>
    ${drafts.map(t=>renderCard(t)).join('')}
    <div style="color:#4a6a2a;font-size:11px;margin:8px 0 14px;text-transform:uppercase;letter-spacing:1px">Completed Outings</div>`:''}
    ${complete.length?complete.map(t=>renderCard(t)).join(''):
    `<div class="empty">
      <div class="empty-icon">🎣</div>
      <div class="empty-title">${showAllUsers?'No outings yet':'No outings logged'}</div>
      <div class="empty-sub">${currentUser?.readonly?'Switch to your angler profile to log outings':'Tap + Outing to log or 📍 Spot to save your GPS location now'}</div>
      ${!currentUser?.readonly?`<button class="btn btn-primary" onclick="startNew()">+ Log First Outing</button>`:''}
    </div>`}`;
}

function renderCard(t) {
  const total=outingTotal(t.id);
  const tc=catches[t.id]||[];
  const tp=photos[t.id]||[];
  const sp=[...new Set(tc.map(c=>c.species))];
  const isOwn=t.user_id===currentUser?.id&&!currentUser?.readonly;

  // Build companion list from two sources:
  // 1. Named persons in catches (e.g. "Keith" logged separately)
  const catchPersons=tc.map(c=>c.person).filter(p=>p&&p!=='Me'&&p!=='');
  // 2. Shared users — find who this outing was shared with via FishingSharedOutings
  // We stored shared outings on load; cross-reference users list by checking
  // which other users have this trip in their shared set
  const sharedUserNames=users
    .filter(u=>u.id!==t.user_id)
    .filter(u=>{
      // Check if this outing appears as shared for this user
      return outings.find(o=>o.id===t.id&&o._sharedWith&&o._sharedWith.includes(u.id));
    })
    .map(u=>fullName(u));
  const companions=[...new Set([...catchPersons,...sharedUserNames])];

  return `<div class="outing-card ${t.status==='draft'?'draft':''}" onclick="openOuting('${t.id}')">
    ${isOwn?`<button class="outing-del" onclick="event.stopPropagation();deleteOuting('${t.id}')">✕</button>`:''}
    <div class="outing-name">${t.location_name||t.location_type||(t.status==='draft'?'📍 Saved Spot':'Unnamed Spot')}</div>
    <div class="outing-meta">${fmtDate(t.date)}${t.location_type?' · '+t.location_type:''}</div>
    <div class="outing-tags">
      ${t.status==='draft'?'<span class="tag draft-tag">📍 Draft — tap to complete</span>':''}
      ${sp.map(s=>`<span class="tag">${s}</span>`).join('')}
      ${t._shared?'<span class="tag" style="background:#2a3a5a">shared</span>':''}
    </div>
    ${companions.length?`<div style="margin-top:8px;display:flex;align-items:center;gap:5px;flex-wrap:wrap"><span style="color:#4a6a2a;font-size:11px">👥</span>${companions.map(c=>`<span style="color:#8aaa60;font-size:12px">${c}</span>`).join('<span style="color:#3a5a1a;font-size:11px"> · </span>')}</div>`:''}
    ${tp.length?`<div class="card-photos">${tp.slice(0,4).map(p=>`<img class="card-photo" src="${p.url}" onclick="event.stopPropagation();openLightbox('${p.url}')" loading="lazy">`).join('')}</div>`:''}
    <div class="outing-footer">
      <div class="outing-angler">
        <div class="angler-dot" style="background:${userColor(t.user_id)}"></div>
        <span style="color:#6a8a50;font-size:12px">${showAllUsers?userDisplayName(t.user_id):(t.user_name||userDisplayName(t.user_id))}</span>
      </div>
      <div class="outing-fish">
        <span class="outing-fish-num">${t.status==='draft'?'—':total}</span>
        <span class="outing-fish-label">${t.status==='draft'?'':'fish'}</span>
      </div>
    </div>
  </div>`;
}

async function openOuting(id) { selectedOuting=outings.find(t=>t.id===id); if(selectedOuting) setView('detail'); }
async function deleteOuting(id) {
  if (!confirm('Delete this outing and all its catches and photos?\nThis cannot be undone.')) return;
  showMsg('Deleting...','loading',0);
  try {
    for (const c of catches[id]||[]) await sbDelete('FishingCatches',c.id);
    for (const p of photos[id]||[]) await sbDelete('FishingPhotos',p.id);
    await sbDelete('FishingTrips',id);
    outings=outings.filter(t=>t.id!==id);
    delete catches[id]; delete photos[id];
    showMsg('✅ Deleted','ok'); render();
  } catch(e){showMsg('⚠️ Delete failed','warn');}
}

// ── QUICK SPOT ────────────────────────────────────────────────
async function quickSpot() {
  if (!navigator.geolocation){alert('GPS not available');return;}
  showMsg('📍 Getting location...','loading',0);
  navigator.geolocation.getCurrentPosition(async pos=>{
    const lat=pos.coords.latitude.toFixed(6),lng=pos.coords.longitude.toFixed(6);
    const now=new Date();
    const o={id:genId(),user_id:currentUser.id,user_name:fullName(currentUser),date:now.toISOString().split('T')[0],location_name:'',location_type:'',latitude:lat,longitude:lng,start_time:now.toTimeString().slice(0,5),end_time:'',bait:'',wind:'',sky:'',notes:'',status:'draft',created_at:now.toISOString()};
    try {
      await sbInsert('FishingTrips',o);
      outings.unshift(o); catches[o.id]=[]; photos[o.id]=[];
      showMsg('📍 Spot saved! '+parseFloat(lat).toFixed(4)+', '+parseFloat(lng).toFixed(4),'ok',5000);
      render();
    } catch(e){showMsg('⚠️ Could not save spot','warn');}
  },()=>showMsg('⚠️ Could not get location','warn'),{enableHighAccuracy:true,timeout:10000});
}

      ${hasGps?`<div class="detail-chip"><div class="detail-chip-label">GPS</div><div class="detail-chip-val" style="font-size:11px;font-family:monospace">${parseFloat(t.latitude).toFixed(4)}, ${parseFloat(t.longitude).toFixed(4)}</div></div>`:''}

    </div>

    ${tp.length?`<div class="section"><div class="section-title">📷 Photos (${tp.length})</div>

function completeDraft() {

  pendingPhotos=[];

function editOuting() {
  const t = selectedOuting;
  const tc = catches[t.id] || [];

  // Rebuild catches — separate person catches vs group catches
  const personCatches = tc.filter(c => c.person);
  const groupCatches = tc.filter(c => !c.person);

  // Rebuild companion user IDs from shared outings (we'll re-share on save)
  // and text companions from catch persons that aren't registered users
  const userNames = users.map(u => fullName(u));
  const catchPersons = [...new Set(personCatches.map(c => c.person).filter(p => p && p !== 'Me'))];
  const companionUserIds = catchPersons.filter(name => users.find(u => fullName(u) === name)).map(name => users.find(u => fullName(u) === name).id);
  const textCompanions = catchPersons.filter(name => !users.find(u => fullName(u) === name));
  const hasSeparate = personCatches.length > 0;

  // Parse bait string back into array
  const baitArr = t.bait ? t.bait.split(',').map(b => b.trim()).filter(Boolean) : [];

  formData = {
    id: t.id,
    isCompleting: false,
    isEditing: true,
    date: t.date || '',
    locationName: t.location_name || '',
    locationType: t.location_type || '',
    latitude: t.latitude || '',
    longitude: t.longitude || '',
    startTime: t.start_time || '',
    endTime: t.end_time || '',
    companions: textCompanions,
    companionUserIds: companionUserIds,
    separateCounts: hasSeparate,
    catches: personCatches.map(c => ({ species: c.species, count: c.count, person: c.person })),
    groupCatches: groupCatches.map(c => ({ species: c.species, count: c.count })),
    bait: baitArr,
    wind: t.wind || '',
    sky: t.sky || '',
    notes: t.notes || '',
    cSpecies: '', cCount: '', cPerson: 'Group', customSpecies: ''
  };
  pendingPhotos = [];
  formStep = 0;
  setView('new');
}

async function addPhotosToOuting(outingId) {
  const input=document.createElement('input');
  input.type='file'; input.accept='image/*'; input.multiple=true;
  input.onchange=async()=>{
    const files=Array.from(input.files);
    if (!files.length) return;
    showMsg('📷 Uploading photos...','loading',0);
    let count=0;
    for (const file of files) {
      try {
        const url=await uploadPhoto(file,outingId);
        const photoRow={id:genId(),trip_id:outingId,user_id:currentUser.id,url,caption:'',created_at:new Date().toISOString()};
        await sbInsert('FishingPhotos',photoRow);
        if (!photos[outingId]) photos[outingId]=[];
        photos[outingId].push(photoRow);
        count++;
      } catch(e){console.error('Photo upload error',e);}
    }
    showMsg(`✅ ${count} photo${count!==1?'s':''} added!`,'ok');
    // Re-render detail
    const body=document.getElementById('appBody');
    if (body && currentView==='detail') body.innerHTML=renderDetail();
  };
  input.click();
}

function captureFields() {
  const g=id=>document.getElementById(id);
  if(g('fSpot')) formData.locationName=g('fSpot').value;
  if(g('fLat')) formData.latitude=g('fLat').value;
  if(g('fLng')) formData.longitude=g('fLng').value;
  if(g('fCount')) formData.cCount=g('fCount').value;
  if(g('fNotes')) formData.notes=g('fNotes').value;
  if(g('fDate')) formData.date=g('fDate').value;
  if(g('fStart')) formData.startTime=g('fStart').value;
  if(g('fEnd')) formData.endTime=g('fEnd').value;
  if(g('fCustomSpecies')) formData.customSpecies=g('fCustomSpecies').value;
}

function captureAndSet(key,val) { captureFields(); formData[key]=formData[key]===val?'':val; rerender(); }
function toggleBait(b) { captureFields(); formData.bait=formData.bait.includes(b)?formData.bait.filter(x=>x!==b):[...formData.bait,b]; rerender(); }
function toggleUserCompanion(uid) { formData.companionUserIds=formData.companionUserIds.includes(uid)?formData.companionUserIds.filter(x=>x!==uid):[...formData.companionUserIds,uid]; rerender(); }
function rerender() { const body=document.getElementById('appBody'); if(body) body.innerHTML=renderForm(); }
function formStepChange(dir) { captureFields(); formStep+=dir; rerender(); }
function addComp() { const el=document.getElementById('compInput'); const v=el?.value?.trim(); if(v){formData.companions.push(v);if(el)el.value='';rerender();} }
function removeComp(i) { formData.companions.splice(i,1); rerender(); }

function addCatch() {
  captureFields();
  let sp=formData.cSpecies;
  if (sp==='Other'&&formData.customSpecies) sp=formData.customSpecies;
  if (!sp||!formData.cCount||parseInt(formData.cCount)<=0) return;
  const entry={species:sp,count:parseInt(formData.cCount)};
  const person=formData.cPerson||'Group';
  if (formData.separateCounts&&person!=='Group'){entry.person=person;formData.catches.push(entry);}
  else formData.groupCatches.push(entry);
  formData.cSpecies=''; formData.cCount=''; formData.customSpecies='';
  rerender();
}

function removeCatch(i) {
  const all=[...formData.catches.map((c,j)=>({...c,_s:'catches',_i:j})),...formData.groupCatches.map((c,j)=>({...c,_s:'groupCatches',_i:j}))];
  const item=all[i];
  if(item._s==='catches') formData.catches.splice(item._i,1);
  else formData.groupCatches.splice(item._i,1);
  rerender();
}

function captureGPS() {
  if (!navigator.geolocation){alert('GPS not available');return;}
  const st=document.getElementById('gpsStatus');
  if(st) st.textContent='⏳ Getting your location...';
  navigator.geolocation.getCurrentPosition(pos=>{
    formData.latitude=pos.coords.latitude.toFixed(6);
    formData.longitude=pos.coords.longitude.toFixed(6);
    const latEl=document.getElementById('fLat'),lngEl=document.getElementById('fLng');
    if(latEl) latEl.value=formData.latitude;
    if(lngEl) lngEl.value=formData.longitude;
    if(st) st.textContent='✅ GPS: '+parseFloat(formData.latitude).toFixed(4)+', '+parseFloat(formData.longitude).toFixed(4);
  },()=>{if(st) st.textContent='⚠️ Could not get location';},{enableHighAccuracy:true,timeout:10000});
}

async function saveOuting() {
  captureFields();
  const btn=document.getElementById('btnSave');
  if(btn){btn.disabled=true;btn.textContent='⏳ Saving...';}
  showMsg('Saving...','loading',0);

  const allCatches=[...formData.catches,...formData.groupCatches];
  const now=new Date().toISOString();
  const outingId=formData.id||genId();

  // Check for new custom species and save them
  const newSpecies=allCatches.map(c=>c.species).filter(s=>!species.includes(s)&&s!=='Other');
  for (const sp of newSpecies) {
    try {
      await sbInsert('FishingSpecies',{id:genId(),name:sp,added_by:currentUser.id,created_at:now});
      species.push(sp);
    } catch {}
  }

  const outing={id:outingId,user_id:currentUser.id,user_name:fullName(currentUser),date:formData.date,location_name:formData.locationName,location_type:formData.locationType,latitude:formData.latitude,longitude:formData.longitude,start_time:formData.startTime,end_time:formData.endTime,bait:formData.bait.join(', '),wind:formData.wind,sky:formData.sky,notes:formData.notes,status:'complete',created_at:now};

  try {
    if(formData.isCompleting || formData.isEditing){
      await sbUpdate('FishingTrips',outingId,outing);
      const idx=outings.findIndex(t=>t.id===outingId);
      if(idx>=0) outings[idx]={...outings[idx],...outing};
      // Delete old catches and re-save fresh ones
      if (formData.isEditing) {
        for (const c of catches[outingId]||[]) { try { await sbDelete('FishingCatches',c.id); } catch {} }
        catches[outingId] = [];
      }
    } else {
      await sbInsert('FishingTrips',outing);
      outings.unshift(outing);
    }

    // Save catches
    catches[outingId]=catches[outingId]||[];
    for (const c of allCatches) {
      const row={id:genId(),trip_id:outingId,user_id:currentUser.id,species:c.species,count:c.count,person:c.person||'',created_at:now};
      await sbInsert('FishingCatches',row);
      catches[outingId].push(row);
    }

    // Share with companion users
    for (const uid of formData.companionUserIds) {
      try {
        await sbInsert('FishingSharedOutings',{id:genId(),trip_id:outingId,user_id:uid,created_at:now});
      } catch {}
    }

    // Upload photos
    photos[outingId]=photos[outingId]||[];
    if (pendingPhotos.length>0) {
      showMsg(`📷 Uploading ${pendingPhotos.length} photo${pendingPhotos.length!==1?'s':''}...`,'loading',0);
      for (const p of pendingPhotos) {
        try {
          const url=await uploadPhoto(p.file,outingId);
          const photoRow={id:genId(),trip_id:outingId,user_id:currentUser.id,url,caption:'',created_at:now};
          await sbInsert('FishingPhotos',photoRow);
          photos[outingId].push(photoRow);
        } catch(e){console.error('Photo upload error',e);}
      }
    }

    showMsg('✅ Outing saved!','ok');
    setView('log');
  } catch(e) {
    showMsg('⚠️ Save failed: '+e.message,'warn');
    if(btn){btn.disabled=false;btn.textContent='✅ Save Outing';}
  }
}

    </div>

    <div class="chips-label">Color</div>
    <div class="color-options">${COLORS.map(c=>`<div class="color-opt ${(currentUser._editColor||u.color)===c?'selected':''}" style="background:${c}" onclick="currentUser._editColor='${c}';renderProfileInPlace()"></div>`).join('')}</div>

    <div class="chips-label">Icon</div>
    <div class="icon-options">${ICONS.map(ic=>`<div class="icon-opt ${(currentUser._editIcon||u.icon)===ic?'selected':''}" onclick="currentUser._editIcon='${ic}';renderProfileInPlace()">${ic}</div>`).join('')}</div>

    <div style="background:#1a2a1a;border:1px solid #3a5a1a;border-radius:10px;padding:16px;margin-bottom:18px">
      <div style="color:#c8e6a0;font-size:15px;font-weight:bold;margin-bottom:12px">Change Secret Code</div>
      <div class="field" style="margin-bottom:10px"><div class="field-label">Current Code</div><input type="number" id="epOldPin" placeholder="Current 4-digit code" style="letter-spacing:6px"></div>
      <div class="field" style="margin-bottom:0"><div class="field-label">New Code (leave blank to keep current)</div><input type="number" id="epNewPin" placeholder="New 4-digit code" style="letter-spacing:6px"></div>
    </div>

    <div id="profileMsg" style="color:#e07070;font-size:13px;min-height:20px;margin-bottom:12px"></div>

    <button class="btn btn-primary btn-full" onclick="saveProfile()" style="margin-bottom:12px">Save Changes</button>
    <button class="btn btn-secondary btn-full" onclick="setView('log')">Cancel</button>
  </div>`;
}

function renderProfileInPlace() {
  const body = document.getElementById('appBody');
  if (body) body.innerHTML = renderEditProfile();
}

async function saveProfile() {
  const first = document.getElementById('epFirst')?.value?.trim();
  const last = document.getElementById('epLast')?.value?.trim() || '';
  const oldPin = document.getElementById('epOldPin')?.value?.trim();
  const newPin = document.getElementById('epNewPin')?.value?.trim();
  const msg = document.getElementById('profileMsg');

  if (!first) { if(msg) msg.textContent = '❌ First name is required'; return; }

  let newPinHash = currentUser.pin_hash;

  // Handle PIN change
  if (newPin) {
    if (!oldPin) { if(msg) msg.textContent = '❌ Enter your current secret code to change it'; return; }
    if (hashPin(oldPin) !== currentUser.pin_hash) { if(msg) msg.textContent = '❌ Current secret code is wrong'; return; }
    if (newPin.length !== 4 || isNaN(newPin)) { if(msg) msg.textContent = '❌ New code must be exactly 4 digits'; return; }
    newPinHash = hashPin(newPin);
  }

  const color = currentUser._editColor || currentUser.color;
  const icon = currentUser._editIcon || currentUser.icon;

  try {
    const updates = { name: first, last_name: last, color, icon, pin_hash: newPinHash };
    await sbUpdate('FishingUsers', currentUser.id, updates);

    // Update local state
    Object.assign(currentUser, updates);
    delete currentUser._editColor;
    delete currentUser._editIcon;
    try { localStorage.setItem('fishlog-user', JSON.stringify(currentUser)); } catch {}

    // Update users array
    const idx = users.findIndex(u => u.id === currentUser.id);
    if (idx >= 0) users[idx] = { ...users[idx], ...updates };

    showMsg('✅ Profile updated!', 'ok');
    setView('log');
  } catch(e) {
    if(msg) msg.textContent = '❌ Save failed: ' + e.message;
  }
}

// ── STATS ─────────────────────────────────────────────────────
function renderStats() {
  const complete=outings.filter(t=>t.status!=='draft');
  if(!complete.length) return `<div class="empty"><div class="empty-icon">📊</div><div class="empty-title">No data yet</div><div class="empty-sub">Log some outings to see stats!</div></div>`;
  const bySpecies={},bySpot={},byUser={};
  let totalFish=0;
  complete.forEach(t=>{
    (catches[t.id]||[]).forEach(c=>{const n=parseInt(c.count)||0;bySpecies[c.species]=(bySpecies[c.species]||0)+n;totalFish+=n;});
    const loc=t.location_name||t.location_type||'Unknown';
    bySpot[loc]=(bySpot[loc]||0)+outingTotal(t.id);
    byUser[t.user_id]=(byUser[t.user_id]||0)+outingTotal(t.id);
  });
  const topSp=Object.entries(bySpecies).sort((a,b)=>b[1]-a[1]);
  const topSt=Object.entries(bySpot).sort((a,b)=>b[1]-a[1]);
  const lb=Object.entries(byUser).sort((a,b)=>b[1]-a[1]);
  return `
    <div class="stats-grid">
      ${[{l:'Outings',v:complete.length},{l:'Total Fish',v:totalFish},{l:'Top Species',v:topSp[0]?.[0]?.split('/')[0]||'—'},{l:'Top Spot',v:topSt[0]?.[0]||'—'}].map(({l,v})=>`<div class="stat-card"><div class="stat-val">${v}</div><div class="stat-label">${l}</div></div>`).join('')}
    </div>
    ${lb.length?`<div class="section"><div class="section-title">🏆 Leaderboard — All Anglers</div>
      ${lb.map(([uid,fish],i)=>`<div class="leaderboard-row">
        <div class="lb-left"><span style="color:#f0c040;font-size:18px;width:28px">${['🥇','🥈','🥉'][i]||''}</span><div class="lb-dot" style="background:${userColor(uid)}"></div><span style="color:#c8e6a0;font-size:15px;font-weight:bold">${userDisplayName(uid)}</span></div>
        <div style="text-align:right"><div style="color:#f0c040;font-size:20px;font-weight:bold">${fish}</div><div style="color:#6a8a50;font-size:11px">fish</div></div>
      </div>`).join('')}
    </div>`:''}
    ${topSp.length?`<div class="section"><div class="section-title">By Species</div>
      ${topSp.map(([sp,ct])=>`<div class="bar-row">
        <div class="bar-label-row"><span style="color:#c8e6a0;font-size:14px">${sp}</span><span style="color:#f0c040;font-weight:bold">${ct}</span></div>
        <div class="bar-bg"><div class="bar-fill" style="width:${Math.round(ct/totalFish*100)}%"></div></div>
      </div>`).join('')}
    </div>`:''}
    ${topSt.length?`<div class="section"><div class="section-title">Top Spots</div>
      ${topSt.slice(0,6).map(([sp,ct])=>`<div class="spot-list-row"><span style="color:#c8e6a0;font-size:13px">📍 ${sp}</span><span style="color:#f0c040;font-weight:bold">${ct} fish</span></div>`).join('')}
    </div>`:''}`;
}

function renderFAQ() {
  return `<div>
    <div style="color:#c8e6a0;font-size:20px;font-weight:bold;margin-bottom:6px">❓ Help & FAQ</div>
    <div style="color:#6a8a50;font-size:13px;margin-bottom:20px">Tap a question to see the answer.</div>
    ${FAQ_ITEMS.map((item,i)=>`<div class="faq-item">
      <div class="faq-question" onclick="toggleFAQ(${i})">
        <span class="faq-q-text">${item.q}</span>
        <span class="faq-arrow ${faqOpen[i]?'open':''}" id="faq-arrow-${i}">▼</span>
      </div>
      <div class="faq-answer ${faqOpen[i]?'open':''}" id="faq-ans-${i}">${item.a}</div>
    </div>`).join('')}
  </div>`;
}

function toggleFAQ(i) {
  faqOpen[i]=!faqOpen[i];
  const ans=document.getElementById('faq-ans-'+i);
  const arrow=document.getElementById('faq-arrow-'+i);
  if(ans) ans.classList.toggle('open',faqOpen[i]);
  if(arrow) arrow.classList.toggle('open',faqOpen[i]);
}

// ── ROUTING ───────────────────────────────────────────────────
function setView(v) { currentView=v; render(); }

// ── INIT ──────────────────────────────────────────────────────
async function init() {
  document.getElementById('app').innerHTML='<div class="loading">⏳ Loading Fish Log...</div>';
  try { await loadData(); }
  catch(e) {
    document.getElementById('app').innerHTML=`<div class="loading" style="color:#e07070">⚠️ Connection error<br><small>${e.message}</small><br><br><button onclick="init()" style="background:#4a7a20;border:none;color:#fff;padding:10px 20px;border-radius:8px;cursor:pointer">Retry</button></div>`;
    return;
  }
  if(!currentUser) setView('auth');
  else setView('log');
}

init();
</script>
